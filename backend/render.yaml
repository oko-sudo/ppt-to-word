# Render.com 배포 설정 파일
# 이 파일을 backend/ 폴더 루트에 두면 Render가 자동으로 인식합니다.
services:
  - type: web
    name: ppt-to-word-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        sync: false   # Render 대시보드에서 직접 입력 (프론트엔드 URL)
      - key: SESSION_EXPIRE_MINUTES
        value: "60"
      - key: MAX_FILE_SIZE_MB
        value: "50"
